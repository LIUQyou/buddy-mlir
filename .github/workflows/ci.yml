name: CI

on:
  push:
    branches: [CI-test]
  pull_request:
    branches: [CI-test]

jobs:
  build-and-test:
    runs-on: self-hosted
    strategy:
      matrix:
        configuration:
          - default
          - lld
          - python-bindings

    steps:
      # 1. Checkout the Repository
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: true

      # 2. Set Up Docker Buildx with docker driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker

      # 3. Restore Buildx Cache
      - name: Restore Buildx Cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-cache-${{ hashFiles('**/Dockerfile.base', '**/Dockerfile.*') }}
          restore-keys: |
            ${{ runner.os }}-buildx-cache-

      # 4. Build the Base Image with Buildx and Caching
      - name: Build Base Image with Buildx and Caching
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t buddycompiler-base:v1.0 \
            -f ci/Dockerfile.base \
            --load \
            .

      # 5. Build Docker Images for Each Matrix Configuration with Caching
      - name: Build Docker Image for Matrix Configuration with Caching
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t buddy-mlir-ci:${{ matrix.configuration }} \
            -f ci/Dockerfile.${{ matrix.configuration }} \
            --load \
            .

      # 6. Save the Updated Buildx Cache
      - name: Save Buildx Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # 7. Cache the Updated Buildx Cache for Future Runs
      - name: Cache Buildx Cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-cache-${{ hashFiles('**/Dockerfile.base', '**/Dockerfile.*') }}
          restore-keys: |
            ${{ runner.os }}-buildx-cache-

      # 8. Configure Build Flags Based on Matrix Configuration
      - name: Configure Build Flags
        id: configure
        run: |
          if [ "${{ matrix.configuration }}" == "cuda" ]; then
            echo "cmake_flags_llvm=-DLLVM_TARGETS_TO_BUILD='host;RISCV;NVPTX' -DMLIR_ENABLE_CUDA_RUNNER=ON" >> $GITHUB_OUTPUT
            echo "cmake_flags_buddy=" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.configuration }}" == "python-bindings" ]; then
            echo "cmake_flags_llvm=-DMLIR_ENABLE_BINDINGS_PYTHON=ON -DPython3_EXECUTABLE=$(which python3)" >> $GITHUB_OUTPUT
            echo "cmake_flags_buddy=-DBUDDY_MLIR_ENABLE_PYTHON_PACKAGES=ON -DPython3_EXECUTABLE=$(which python3)" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.configuration }}" == "lld" ]; then
            echo "cmake_flags_llvm=-DLLVM_USE_LINKER=lld" >> $GITHUB_OUTPUT
            echo "cmake_flags_buddy=" >> $GITHUB_OUTPUT
          else
            echo "cmake_flags_llvm=" >> $GITHUB_OUTPUT
            echo "cmake_flags_buddy=" >> $GITHUB_OUTPUT
          fi

      # 9. Run the Docker Container for the Current Configuration
      - name: Run Docker Container
        run: |
          docker run -d --name buddy-mlir-ci-${{ matrix.configuration }} \
            -v "${GITHUB_WORKSPACE}:/root/buddy-mlir" \
            -w "/root/buddy-mlir" \
            buddy-mlir-ci:${{ matrix.configuration }} tail -f /dev/null

      # 10. Initialize the Nix Environment Inside the Container
      - name: Initialize Nix Environment Inside the Container
        run: |
          docker exec -w "/root/buddy-mlir" buddy-mlir-ci-${{ matrix.configuration }} /bin/bash -c "
            set -e
            nix develop -c bash -c 'echo Nix environment setup complete'
          "

      # 11. Build LLVM Inside the Container
      - name: Build LLVM
        run: |
          docker exec -w "/root/buddy-mlir" buddy-mlir-ci-${{ matrix.configuration }} /bin/bash -c "
            set -e
            nix develop -c bash -c '
              mkdir -p llvm/build && cd llvm/build
              cmake -G Ninja ../llvm \
                -DLLVM_ENABLE_PROJECTS=\"mlir;clang\" \
                -DLLVM_TARGETS_TO_BUILD=\"host;RISCV\" \
                -DLLVM_ENABLE_ASSERTIONS=ON \
                -DCMAKE_BUILD_TYPE=Release \
                ${{ steps.configure.outputs.cmake_flags_llvm }}
              ninja check-mlir check-clang
            '
          "

      # 12. Verify LLVM Build Directory Exists
      - name: Check LLVM Build Path
        run: |
          docker exec buddy-mlir-ci-${{ matrix.configuration }} /bin/bash -c "
            if [ ! -d /root/buddy-mlir/llvm/build ]; then
              echo 'LLVM build directory does not exist'
              exit 1
            fi
          "

      # 13. Build buddy-mlir Inside the Container
      - name: Build buddy-mlir
        run: |
          docker exec -w "/root/buddy-mlir" buddy-mlir-ci-${{ matrix.configuration }} /bin/bash -c "
            set -e
            nix develop -c bash -c '
              mkdir -p build && cd build
              cmake -G Ninja .. \
                -DMLIR_DIR=\$PWD/../llvm/build/lib/cmake/mlir \
                -DLLVM_DIR=\$PWD/../llvm/build/lib/cmake/llvm \
                -DLLVM_ENABLE_ASSERTIONS=ON \
                -DCMAKE_BUILD_TYPE=Release \
                ${{ steps.configure.outputs.cmake_flags_buddy }}
              ninja
              ninja check-buddy
            '
          "

      # 14. Copy Build Artifacts from Container to Host
      - name: Copy build artifacts to host
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/llvm
          docker cp buddy-mlir-ci-${{ matrix.configuration }}:/root/buddy-mlir/llvm/build ${GITHUB_WORKSPACE}/llvm/build
          docker cp buddy-mlir-ci-${{ matrix.configuration }}:/root/buddy-mlir/build ${GITHUB_WORKSPACE}/build

      # 15. Stop and Remove the Docker Container
      - name: Stop and Remove Docker Container
        if: always()
        run: |
          docker stop buddy-mlir-ci-${{ matrix.configuration }}
          docker rm buddy-mlir-ci-${{ matrix.configuration }}

      # 16. Upload Test Results if the Build Fails
      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.configuration }}
          path: |
            buddy-mlir/llvm/build/Testing/**/Testing/*.xml
            buddy-mlir/build/Testing/**/Testing/*.xml

      # 17. Archive Build Artifacts Regardless of Success or Failure
      - name: Archive Build Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ matrix.configuration }}
          path: buddy-mlir/build
